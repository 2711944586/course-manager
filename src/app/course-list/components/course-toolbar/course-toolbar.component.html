<section class="toolbar-card">
  <div class="field-group">
    <div class="control-item control-search">
      <span class="control-label">搜索课程</span>
      <mat-form-field appearance="outline" class="search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input
          matInput
          [value]="searchKeyword"
          placeholder="按课程名、教师或时间搜索"
          aria-label="搜索课程"
          (input)="onSearchInput($event)"
        />
        @if (searchKeyword) {
          <button mat-icon-button matSuffix type="button" aria-label="清空搜索关键词" (click)="clearKeyword()">
            <mat-icon>close</mat-icon>
          </button>
        }
      </mat-form-field>
    </div>

    <div class="control-item">
      <span class="control-label">课程状态</span>
      <mat-form-field appearance="outline">
        <mat-icon matPrefix>filter_alt</mat-icon>
        <mat-select
          [value]="selectedStatus"
          aria-label="课程状态筛选"
          (selectionChange)="onStatusSelect($event.value)"
        >
          <mat-option value="all">全部状态</mat-option>
          @for (option of statusOptions; track option.value) {
            <mat-option [value]="option.value">{{ option.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="control-item">
      <span class="control-label">排序方式</span>
      <mat-form-field appearance="outline">
        <mat-icon matPrefix>swap_vert</mat-icon>
        <mat-select
          [value]="selectedSort"
          aria-label="课程排序方式"
          (selectionChange)="onSortSelect($event.value)"
        >
          @for (option of sortOptions; track option.value) {
            <mat-option [value]="option.value">{{ option.label }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
  </div>

  <div class="toolbar-actions">
    <button mat-stroked-button type="button" (click)="requestExport()">
      <mat-icon>download</mat-icon>
      导出 CSV
    </button>
    <button mat-flat-button color="primary" type="button" (click)="requestCreate()">
      <mat-icon>add</mat-icon>
      新建课程
    </button>
  </div>
</section>
