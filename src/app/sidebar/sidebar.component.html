<nav class="floating-dock" aria-label="主导航">
  <div class="dock-core" [class.collapsed]="!isExpanded()">
    <button
      type="button"
      class="dock-brand dock-toggle"
      (click)="toggleDock()"
      [attr.aria-expanded]="isExpanded()"
      [attr.aria-label]="isExpanded() ? '收起中控台' : '展开中控台'"
      aria-controls="primary-dock-items"
      [matTooltip]="isExpanded() ? '收起中控台' : '展开中控台'"
      matTooltipPosition="above"
      matTooltipClass="dock-tooltip"
    >
      <span class="dock-brand-core">
        <mat-icon>neurology</mat-icon>
      </span>
      <span class="dock-toggle-badge" aria-hidden="true">
        <mat-icon>{{ isExpanded() ? 'keyboard_arrow_left' : 'keyboard_arrow_right' }}</mat-icon>
      </span>
    </button>

    <div class="dock-items" id="primary-dock-items" [attr.aria-hidden]="!isExpanded()">
      @for (item of dockItems; track item.route) {
        <a
          class="dock-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
          [attr.tabindex]="isExpanded() ? null : -1"
          [attr.aria-label]="item.label"
          [matTooltip]="item.label"
          matTooltipPosition="above"
          matTooltipClass="dock-tooltip"
          matRipple
        >
          <span class="dock-icon">
            <mat-icon>{{ item.icon }}</mat-icon>
          </span>
        </a>
      }
    </div>
  </div>
</nav>
